apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-app
  namespace: argocd 
spec:
  project: default
  source:
    repoURL: https://gitlab.com/ayoubchii02/product-microservice-kubernetes.git
    targetRevision: HEAD
    path: product-k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: product-local
  syncPolicy:
    syncOptions:
    - createNamespace=true  
    automated:
      prune: true
      selfHeal: true